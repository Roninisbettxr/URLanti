<body>
<h4> URL Malware Finder </h4>
<div>
<input id="user-url" placeholder="Search A Url To Fine MalWare Or Non!">
<button id="scan-btn">Search  Url</button>
<a href="https://accounts.google.com/o/oauth2/v2/auth?client_id=408896177030-jqph8rudb0r6jgq8hqlj1mrtc95bblti.apps.googleusercontent.com&redirect_uri=https://url-anti.vercel.app&response_type=code&scope=openid%20email%20profile"><button>Sign In</button></a>
</div>

<div id="scan-result"></div>

<script>
        const scanBtn = document.getElementById('scan-btn');
        const urlInput = document.getElementById('user-url');
        const resultDiv = document.getElementById('scan-result');

        scanBtn.addEventListener('click', function() {
            const urlToCheck = urlInput.value.trim();

            if (urlToCheck === "") {
                resultDiv.style.color = "#ffdd00";
                resultDiv.innerHTML = "⚠️ Please enter a URL first!";
                return;
            }

            resultDiv.style.color = "#ffffff"; 
            resultDiv.innerHTML = "🔍 Scanning infrastructure... checking for malware...";

            setTimeout(function() {
                const scamKeywords = ['free', 'virus', 'crack', 'steal', 'hack'];
                let isSuspicious = scamKeywords.some(word => urlToCheck.toLowerCase().includes(word));

                if (!urlToCheck.startsWith('https://')) {
                    isSuspicious = true;
                }

                if (isSuspicious) {
                    resultDiv.style.color = "#ff4444";
                    resultDiv.innerHTML = "⚠️ WARNING: This URL matches known threat patterns or is unencrypted!";
                } else {
                    resultDiv.style.color = "#44ff44";
                    resultDiv.innerHTML = "✅ SAFE: No immediate malware or phishing threats detected.";
                }
            }, 1500); 
        });
    </script>
