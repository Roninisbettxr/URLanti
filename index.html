<body>
<h4> URL Malware Finder </h4>
<div>
<input id="user-url" placeholder="Search A Url To Fine MalWare Or Non!" type="url" >
<button id="scan-btn">Search  Url</button>
<a href="https://accounts.google.com/o/oauth2/v2/auth?client_id=408896177030-jqph8rudb0r6jgq8hqlj1mrtc95bblti.apps.googleusercontent.com&redirect_uri=https://url-anti.vercel.app&response_type=code&scope=openid%20email%20profile"><button id="sign-in-btn">Sign In</button></a>
<button id="clear-btn" type="button">Clear</button>
</div>







<div id="scan-result"></div>
<title>URL Malware Finder</title>
<script>
        const scanBtn = document.getElementById('scan-btn');
        const urlInput = document.getElementById('user-url');
        const resultDiv = document.getElementById('scan-result');

        scanBtn.addEventListener('click', function() {
            const urlToCheck = urlInput.value.trim();

            if (urlToCheck === "") {
                resultDiv.style.color = "#ffdd00";
                resultDiv.innerHTML = "⚠️ Please enter a URL first!";
                return;
            }

            resultDiv.style.color = "#ffffff"; 
            resultDiv.innerHTML = "🔍 Scanning infrastructure... checking for malware...";

            setTimeout(function() {
                const scamKeywords = ['free', 'virus', 'crack', 'steal', 'hack'];
                let isSuspicious = scamKeywords.some(word => urlToCheck.toLowerCase().includes(word));

                if (!urlToCheck.startsWith('https://')) {
                    isSuspicious = true;
                }

                if (isSuspicious) {
                    resultDiv.style.color = "#ff4444";
                    resultDiv.innerHTML = "⚠️ WARNING: This URL matches known threat patterns or is unencrypted!";
                } else {
                    resultDiv.style.color = "#44ff44";
                    resultDiv.innerHTML = "✅ SAFE: No immediate malware or phishing threats detected.";
                }
            }, 1500); 
        });
    </script>

<script>
// 1. Grab the new Clear button from the HTML
const clearBtn = document.getElementById('clear-btn');

// 2. Listen for a click on the Clear button
clearBtn.addEventListener('click', function() {
    urlInput.value = "";       // Wipes out whatever text is inside the green input bar
    resultDiv.innerHTML = "";  // Erases the "SAFE" or "WARNING" message
});
</script>

<script>

// 1. Grab your existing Sign In button from your HTML
const signInBtn = document.getElementById('sign-in-btn'); // Make sure your HTML button has id="sign-in-btn"

// 2. Track whether the user is logged in or not (starts as false)
let isLoggedIn = false;

// 3. Listen for clicks on the button
signInBtn.addEventListener('click', function() {
    if (!isLoggedIn) {
        // If they aren't logged in, log them in!
        isLoggedIn = true;
        signInBtn.innerText = "Log Out";
        signInBtn.style.backgroundColor = "#dc2626"; // Optional: Switch it to a deep red color when it's a log out button
        alert("You are now signed in!");
    } else {
        // If they are already logged in, log them out!
        isLoggedIn = false;
        signInBtn.innerText = "Sign In";
        signInBtn.style.backgroundColor = ""; // Resets back to your original red color
        alert("You have logged out.");
    }
});





</script>
